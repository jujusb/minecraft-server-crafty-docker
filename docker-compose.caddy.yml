networks:
  caddy_net:
    external: true
  crafty_internal_net:
    external: true
    
services:
  caddy-crafty:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "${MINECRAFT_ADMIN_PORT:-8080}:8080"
      - "${MINECRAFT_DYNMAP_PORT:-8123}:8123"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - caddy_net
      - crafty_internal_net

volumes:
  caddy_data:
  caddy_config: